name: News Scraper Automation

on:
  # 定期実行の設定
  # GitHub ActionsはUTC（世界標準時）で動くため、日本時間(JST)から9時間引いた時間を指定します
  # JST 6:00, 12:00, 18:00, 24:00 -> UTC 21:00, 3:00, 9:00, 15:00
  schedule:
    - cron: '0 3,9,15,21 * * *'
  
  # GitHubの画面から「今すぐ実行」ボタンも出せるように設定
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト（取得）
        uses: actions/checkout@v4

      - name: Go言語の環境をセットアップ
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # ご主人様の環境に合わせています

      - name: ニュース収集＆Notion書き込みを実行！
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: go run main.go